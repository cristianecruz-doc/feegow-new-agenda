<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Feegow · Nova Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/symbol-feegow-primary.svg">
<meta name="ext-resource-dependency" content="assets/symbol-feegow-primary.svg" data-resource-id="feegowSymbol" />
<meta name="ext-resource-dependency" content="assets/icon-doctoralia.png" data-resource-id="doctoIcon" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #f7f8f8; font-family: "InterVariable","Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color: #242727; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #root { height: 100%; }
  button, input, select, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: #d2d6d6; border-radius: 999px; border: 3px solid #fff; }
  ::-webkit-scrollbar-thumb:hover { background: #afb4b4; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes wspin { to { transform: rotate(360deg); } }
  @keyframes wtoast { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes drawerIn { from { transform: translateX(24px); opacity: .4; } to { transform: translateX(0); opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(40px); } to { transform: translateY(0); } }
  @keyframes modalIn { from { transform: scale(.97); opacity: .4; } to { transform: scale(1); opacity: 1; } }
  [data-lucide] { display: inline-flex; }
  @media print {
    body * { visibility: hidden !important; }
    [data-print-area], [data-print-area] * { visibility: visible !important; }
    [data-print-area] { position: absolute !important; left: 0; top: 0; width: 100%; height: auto !important; overflow: visible !important; padding: 0 !important; }
    [data-print-only] { display: block !important; }
    @page { margin: 16mm; }
  }
</style>
</head>

  <div id="root"></div>

      <rect x="52" y="44" width="14" height="9" rx="2" fill="#007c68"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
